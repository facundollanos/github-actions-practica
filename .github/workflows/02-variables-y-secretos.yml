# WORKFLOW 2: Variables de entorno y secretos
#
# VARIABLES DE ENTORNO: valores que no son sensibles.
# Se definen a nivel de workflow, job, o step.
#
# SECRETOS: valores sensibles (passwords, API keys).
# Se configuran en GitHub → Settings → Secrets and variables → Actions
# NUNCA se ven en los logs, GitHub los enmascara automáticamente.

name: Variables y Secretos

on:
  push:
    branches: [main]

# Variables disponibles en TODO el workflow
env:
  APP_ENV: production
  NODE_VERSION: '20'

jobs:
  demo-variables:
    runs-on: ubuntu-latest

    # Variables disponibles solo en este job
    env:
      JOB_REGION: us-east-1

    steps:
      - uses: actions/checkout@v4

      - name: Usar variables de entorno
        run: |
          echo "Ambiente: $APP_ENV"
          echo "Region: $JOB_REGION"
          echo "Node: $NODE_VERSION"

      - name: Variable solo en este step
        env:
          STEP_VAR: solo-aqui
        run: echo "Solo en este step: $STEP_VAR"

      - name: Usar un secreto
        # Los secretos vienen de: GitHub → Settings → Secrets
        # Se acceden con ${{ secrets.NOMBRE_DEL_SECRETO }}
        env:
          MI_API_KEY: ${{ secrets.MI_API_KEY }}
        run: |
          echo "La API key tiene ${#MI_API_KEY} caracteres"
          # Nunca hagas: echo "$MI_API_KEY" — GitHub lo enmascara pero es mala práctica

      - name: Variables predefinidas por GitHub
        run: |
          echo "Repo: $GITHUB_REPOSITORY"
          echo "Branch: $GITHUB_REF_NAME"
          echo "Commit: $GITHUB_SHA"
          echo "Actor (quien hizo push): $GITHUB_ACTOR"
          echo "Numero de run: $GITHUB_RUN_NUMBER"
