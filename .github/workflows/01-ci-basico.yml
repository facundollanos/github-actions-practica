# WORKFLOW 1: CI básico
# Corre en cada push y PR a main.
# Baja el repo, instala dependencias, corre tests.

name: CI Básico

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Bajar el código del repo
        uses: actions/checkout@v4

      - name: Instalar Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'        # cachea node_modules entre runs para ir más rápido

      - name: Instalar dependencias
        run: npm install

      - name: Correr tests
        run: npm test

      - name: Correr linter
        run: npm run lint
